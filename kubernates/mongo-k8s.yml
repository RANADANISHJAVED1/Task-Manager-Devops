apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-mongo
  labels:
    app: task-manager-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-mongo
  template:
    metadata:
      labels:
        app: task-manager-mongo
    spec:
      containers:
      - name: task-manager-mongo
        image: mongo
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: password
        
