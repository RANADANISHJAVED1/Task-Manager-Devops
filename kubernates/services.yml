apiVersion: v1
kind: Service
metadata:
  name: task-manager-frontend
spec:
  selector:
    app: task-manager-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80         # service port
      targetPort: 3000 # match your container port
  type: NodePort      # LoadBalancer in Minikube won't work without tunnel
  # Optional: fixed NodePort to access from EC2
  # nodePort: 30030

---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-backend
spec:
  selector:
    app: task-manager-backend
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: NodePort
  # nodePort: 30031  # optional fixed port

---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-mongo
spec:
  selector:
    app: task-manager-mongo
  ports:
    - name: mongo
      protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
