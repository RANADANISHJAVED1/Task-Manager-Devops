events {}

http {
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # API proxy (frontend → backend service)
        location /api {
            proxy_pass http://task-manager-backend:3001;
        }

        # Serve static files correctly
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}